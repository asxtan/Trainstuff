<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Commute Board</title>
  <meta name="theme-color" content="#0b1f17" />
  <meta name="description" content="Live UK train departures for your commute." />

  <!-- PWA / iOS Add to Home Screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Commute" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <div class="mode-toggle" role="tablist" aria-label="Direction">
        <button id="mode-work" class="seg" type="button" role="tab">To work</button>
        <button id="mode-home" class="seg" type="button" role="tab">To home</button>
      </div>
      <button id="settings-btn" class="gear" type="button" aria-label="Edit stations" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <div id="return-pick" class="return-pick" hidden>
      <span class="rp-label">Returning from</span>
      <div class="seg-group">
        <button id="ret-a" class="seg" type="button"></button>
        <button id="ret-b" class="seg" type="button"></button>
      </div>
    </div>

    <div class="status-line">
      <span id="route-label" class="route"></span>
      <span id="updated" class="updated"></span>
    </div>

    <div id="settings" class="settings" hidden>
      <div class="field">
        <label for="home-input">Home station</label>
        <input id="home-input" type="text" autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="Station" />
        <ul id="home-list" class="suggestions" hidden></ul>
      </div>
      <div class="field">
        <label for="a-input">Work station A</label>
        <input id="a-input" type="text" autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="Station" />
        <ul id="a-list" class="suggestions" hidden></ul>
      </div>
      <div class="field">
        <label for="b-input">Work station B</label>
        <input id="b-input" type="text" autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="Station" />
        <ul id="b-list" class="suggestions" hidden></ul>
      </div>
      <button id="settings-done" class="seg done" type="button">Done</button>
    </div>
  </header>

  <main id="board" class="board" aria-live="polite">
    <p class="placeholder">Loading departures…</p>
  </main>

  <div id="banner" class="banner" hidden></div>

  <footer class="footer">
    <button id="refresh-btn" type="button" class="refresh">Refresh</button>
    <span class="credit">Live data via Huxley2 / National Rail Darwin</span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
